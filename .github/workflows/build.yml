name: Build Arch Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PKGEXT: .pkg.tar.zst

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Create build user
        run: |
          pacman -Syu --noconfirm base-devel git
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install build deps
        run: |
          pacman -S --noconfirm cmake qt6-base qt6-declarative qt6-wayland qt6-connectivity qt6-svg hyprland wireplumber pipewire dbus libpulse systemd-libs brightnessctl hyprsunset upower bluez bluez-utils quickshell

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "git config --global --add safe.directory '$GITHUB_WORKSPACE'"
          cd "$GITHUB_WORKSPACE"
          git archive --prefix=Tide-island-1.0.20/ --format=tar.gz -o tide-island-1.0.20.tar.gz HEAD
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg --noconfirm"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: tide-island-pkg
          path: "*.pkg.tar.zst"
