name: Build Arch Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in Arch container
        run: |
          docker run --rm --privileged \
            --volume "$PWD:/pkg" \
            archlinux:base-devel \
            bash -c '
              set -e
              pacman -Syu --noconfirm
              pacman -S --noconfirm --needed git cmake qt6-base qt6-declarative qt6-wayland qt6-connectivity qt6-svg systemd-libs

              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              chown -R builder:builder /pkg

              cd /pkg
              su builder -c "git config --global --add safe.directory /pkg"
              su builder -c "git archive --prefix=Tide-island-1.0.20/ --format=tar.gz -o tide-island-1.0.20.tar.gz HEAD"
              su builder -c "makepkg --noconfirm --nodeps"
            '

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: tide-island-pkg
          path: "*.pkg.tar.zst"
